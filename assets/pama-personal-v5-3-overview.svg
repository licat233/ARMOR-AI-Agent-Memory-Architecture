<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">PAMA Personal V5.3 Stable Overview</title>
  <desc id="desc">PAMA Personal V5.3 Stable memory architecture showing trusted agent runtimes, user sovereignty, working memory, reviews, personal truth, and multi-agent shared Vault governance.</desc>
  <defs>
    <style>
      .bg { fill: #fbfaf7; }
      .panel { fill: #ffffff; stroke: #d9e1e8; stroke-width: 2; }
      .bluebox { fill: #eef7ff; stroke: #aacfe8; stroke-width: 2; }
      .greenbox { fill: #eefbf3; stroke: #9bd8b4; stroke-width: 2; }
      .amberbox { fill: #fff7ed; stroke: #fdc78b; stroke-width: 2; }
      .redbox { fill: #fff1f2; stroke: #f3a7b5; stroke-width: 2; }
      .purplebox { fill: #f4f0ff; stroke: #c9b9f0; stroke-width: 2; }
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #102033; }
      .subtitle { font: 500 15px Arial, Helvetica, sans-serif; fill: #5a6b7b; }
      .h2 { font: 700 21px Arial, Helvetica, sans-serif; fill: #102033; }
      .h3 { font: 700 16px Arial, Helvetica, sans-serif; fill: #102033; }
      .text { font: 500 14px Arial, Helvetica, sans-serif; fill: #314456; }
      .small { font: 500 12px Arial, Helvetica, sans-serif; fill: #5a6b7b; }
      .label { font: 700 12px Arial, Helvetica, sans-serif; fill: #2563eb; }
      .line { stroke: #6b7f93; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #8aa0b5; stroke-width: 2.5; fill: none; stroke-dasharray: 8 8; marker-end: url(#arrowMuted); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#6b7f93"/>
    </marker>
    <marker id="arrowMuted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#8aa0b5"/>
    </marker>
  </defs>

  <rect class="bg" width="1280" height="760"/>

  <text x="60" y="58" class="title">PAMA Personal V5.3 Stable</text>
  <text x="60" y="88" class="subtitle">Personal reality, decision, and evolution memory for trusted AI assistants</text>
  <text x="60" y="112" class="small">AI Agent Memory Architecture v1.2.4</text>

  <rect x="60" y="145" width="255" height="128" rx="14" class="panel"/>
  <text x="88" y="184" class="h2">Trusted Agents</text>
  <text x="88" y="216" class="text">Hermes, Codex, Claude Code</text>
  <text x="88" y="244" class="small">Executors and reviewers, not truth authority</text>

  <rect x="60" y="330" width="255" height="116" rx="14" class="amberbox"/>
  <text x="88" y="367" class="h2">Runtime Memory</text>
  <text x="88" y="398" class="text">Temporary cache only</text>
  <text x="88" y="423" class="small">No durable truth, goals, or identity</text>

  <rect x="60" y="505" width="255" height="110" rx="14" class="purplebox"/>
  <text x="88" y="543" class="h2">User Sovereignty</text>
  <text x="88" y="575" class="text">User is final authority</text>
  <text x="88" y="599" class="small">Truth, goals, identity, major decisions</text>

  <rect x="382" y="135" width="280" height="112" rx="14" class="bluebox"/>
  <text x="412" y="173" class="h2">Prompt Intake Router</text>
  <text x="412" y="205" class="text">Classify personal-memory risk</text>
  <text x="412" y="229" class="small">Remember, fix, discuss, high risk</text>

  <rect x="382" y="295" width="280" height="150" rx="14" class="panel"/>
  <text x="412" y="333" class="h2">PAMA Write Router</text>
  <text x="412" y="366" class="text">Reality or interpretation?</text>
  <text x="412" y="392" class="text">Decision, goal, truth, or hypothesis?</text>
  <text x="412" y="418" class="text">Store lower unless evidence is strong</text>

  <rect x="382" y="505" width="280" height="112" rx="14" class="redbox"/>
  <text x="412" y="543" class="h2">Review Gate</text>
  <text x="412" y="575" class="text">Promote rarely into truth</text>
  <text x="412" y="599" class="small">User approval or explicit review</text>

  <rect x="730" y="120" width="485" height="535" rx="24" class="greenbox"/>
  <text x="765" y="164" class="h2">PAMA Personal Vault</text>
  <text x="765" y="190" class="text">Durable personal memory with layered authority</text>

  <rect x="765" y="225" width="200" height="78" rx="12" class="panel"/>
  <text x="790" y="254" class="h3">00-Core</text>
  <text x="790" y="281" class="small">Constitution, routers, policy</text>

  <rect x="990" y="225" width="190" height="78" rx="12" class="panel"/>
  <text x="1015" y="254" class="h3">01-Reality</text>
  <text x="1015" y="281" class="small">Evidence-backed events</text>

  <rect x="765" y="325" width="200" height="78" rx="12" class="panel"/>
  <text x="790" y="354" class="h3">03-Decisions</text>
  <text x="790" y="381" class="small">Choices and feedback</text>

  <rect x="990" y="325" width="190" height="78" rx="12" class="panel"/>
  <text x="1015" y="354" class="h3">04-Goals</text>
  <text x="1015" y="381" class="small">Direction and priorities</text>

  <rect x="765" y="425" width="200" height="78" rx="12" class="amberbox"/>
  <text x="790" y="454" class="h3">06-Meta</text>
  <text x="790" y="481" class="small">Hypotheses, not reality</text>

  <rect x="990" y="425" width="190" height="78" rx="12" class="redbox"/>
  <text x="1015" y="454" class="h3">05-Truth</text>
  <text x="1015" y="481" class="small">Small, verified, user-approved</text>

  <rect x="765" y="530" width="415" height="80" rx="12" class="bluebox"/>
  <text x="790" y="560" class="h3">Multi-Agent PAMA Governance</text>
  <text x="790" y="586" class="small">08-Working-Memory/{agent}  07-Reviews/{agent}</text>

  <path class="line" d="M315 208 C345 208, 352 191, 382 191"/>
  <path class="line" d="M522 247 L522 295"/>
  <path class="line" d="M662 370 C690 370, 700 360, 730 342"/>
  <path class="line" d="M522 445 L522 505"/>
  <path class="line" d="M662 561 C700 561, 705 540, 730 525"/>
  <path class="dash" d="M315 388 C345 388, 352 370, 382 370"/>
  <path class="line" d="M315 560 C345 560, 352 560, 382 560"/>

  <text x="340" y="190" class="label">requests</text>
  <text x="674" y="356" class="label">layered writes</text>
  <text x="674" y="546" class="label">reviewed promotion</text>
  <text x="318" y="380" class="small">cache pointers only</text>
  <text x="326" y="548" class="small">final approval boundary</text>

  <rect x="60" y="690" width="1155" height="42" rx="18" fill="#eee7fb"/>
  <text x="88" y="716" class="small">Principle: Memory should make reality clearer. Agents may help, but the user decides what becomes durable personal truth.</text>
</svg>
