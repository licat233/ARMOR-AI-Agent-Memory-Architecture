<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">ARMOR Enterprise V7.2 Stable Overview</title>
  <desc id="desc">ARMOR Enterprise V7.2 Stable memory architecture showing trusted agent runtimes, governed write routing, multi-agent namespaces, proposal review, and an enterprise Vault as source of truth.</desc>
  <defs>
    <style>
      .bg { fill: #f7fafc; }
      .panel { fill: #ffffff; stroke: #d8e2ec; stroke-width: 2; }
      .bluebox { fill: #edf7ff; stroke: #aacfe8; stroke-width: 2; }
      .greenbox { fill: #ecfdf5; stroke: #9bd8b4; stroke-width: 2; }
      .amberbox { fill: #fff7ed; stroke: #fdc78b; stroke-width: 2; }
      .redbox { fill: #fff1f2; stroke: #f3a7b5; stroke-width: 2; }
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #102033; }
      .subtitle { font: 500 15px Arial, Helvetica, sans-serif; fill: #5a6b7b; }
      .h2 { font: 700 21px Arial, Helvetica, sans-serif; fill: #102033; }
      .h3 { font: 700 16px Arial, Helvetica, sans-serif; fill: #102033; }
      .text { font: 500 14px Arial, Helvetica, sans-serif; fill: #314456; }
      .small { font: 500 12px Arial, Helvetica, sans-serif; fill: #5a6b7b; }
      .label { font: 700 12px Arial, Helvetica, sans-serif; fill: #2563eb; }
      .line { stroke: #6b7f93; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #8aa0b5; stroke-width: 2.5; fill: none; stroke-dasharray: 8 8; marker-end: url(#arrowMuted); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#6b7f93"/>
    </marker>
    <marker id="arrowMuted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#8aa0b5"/>
    </marker>
  </defs>

  <rect class="bg" width="1280" height="760"/>

  <text x="60" y="58" class="title">ARMOR Enterprise V7.2 Stable</text>
  <text x="60" y="88" class="subtitle">Governed, auditable, source-backed business memory for trusted agent runtimes</text>
  <text x="60" y="112" class="small">AI Agent Memory Architecture v1.2.0</text>

  <rect x="60" y="145" width="255" height="150" rx="14" class="panel"/>
  <text x="88" y="184" class="h2">Trusted Agent Runtimes</text>
  <text x="88" y="216" class="text">Hermes, Codex, Claude Code</text>
  <text x="88" y="241" class="text">Opencode, Cline, OpenHands</text>
  <text x="88" y="270" class="small">File read, search, patch, write</text>

  <rect x="60" y="345" width="255" height="118" rx="14" class="amberbox"/>
  <text x="88" y="383" class="h2">Runtime Memory</text>
  <text x="88" y="416" class="text">Temporary cache only</text>
  <text x="88" y="441" class="small">State, indexes, short pointers</text>

  <rect x="382" y="135" width="280" height="112" rx="14" class="bluebox"/>
  <text x="412" y="173" class="h2">Prompt Intake Router</text>
  <text x="412" y="205" class="text">Classify intent before action</text>
  <text x="412" y="229" class="small">Answer, remember, fix, high risk</text>

  <rect x="382" y="295" width="280" height="158" rx="14" class="panel"/>
  <text x="412" y="333" class="h2">Memory Write Router</text>
  <text x="412" y="366" class="text">Extract candidate</text>
  <text x="412" y="392" class="text">Check confidence and source</text>
  <text x="412" y="418" class="text">Search SSOT before authority</text>

  <rect x="382" y="505" width="280" height="116" rx="14" class="redbox"/>
  <text x="412" y="543" class="h2">Proposal Gate</text>
  <text x="412" y="576" class="text">Human review for Class A</text>
  <text x="412" y="600" class="small">Core, Facts, Rules, conflicts</text>

  <rect x="730" y="120" width="485" height="535" rx="24" class="greenbox"/>
  <text x="765" y="164" class="h2">ARMOR Enterprise Vault</text>
  <text x="765" y="190" class="text">Durable source of truth for business memory</text>

  <rect x="765" y="225" width="200" height="78" rx="12" class="panel"/>
  <text x="790" y="254" class="h3">00-Core</text>
  <text x="790" y="281" class="small">Routers, policies, SSOT map</text>

  <rect x="990" y="225" width="190" height="78" rx="12" class="panel"/>
  <text x="1015" y="254" class="h3">Class A Authority</text>
  <text x="1015" y="281" class="small">Facts and Rules</text>

  <rect x="765" y="325" width="200" height="78" rx="12" class="panel"/>
  <text x="790" y="354" class="h3">Reviewed Knowledge</text>
  <text x="790" y="381" class="small">Insights and research</text>

  <rect x="990" y="325" width="190" height="78" rx="12" class="panel"/>
  <text x="1015" y="354" class="h3">Evidence</text>
  <text x="1015" y="381" class="small">Records and sources</text>

  <rect x="765" y="425" width="200" height="78" rx="12" class="panel"/>
  <text x="790" y="454" class="h3">Active Work</text>
  <text x="790" y="481" class="small">Projects and execution</text>

  <rect x="990" y="425" width="190" height="78" rx="12" class="amberbox"/>
  <text x="1015" y="454" class="h3">Low Authority</text>
  <text x="1015" y="481" class="small">Drafts, inbox, logs</text>

  <rect x="765" y="530" width="415" height="80" rx="12" class="bluebox"/>
  <text x="790" y="560" class="h3">Multi-Agent Shared Vault Governance</text>
  <text x="790" y="586" class="small">91-Inbox/{agent}  92-Logs/{agent}  93-Proposals/{agent}</text>

  <path class="line" d="M315 220 C345 220, 352 191, 382 191"/>
  <path class="line" d="M522 247 L522 295"/>
  <path class="line" d="M662 374 C690 374, 700 360, 730 342"/>
  <path class="line" d="M522 453 L522 505"/>
  <path class="line" d="M662 563 C700 563, 705 542, 730 525"/>
  <path class="dash" d="M315 404 C345 404, 352 374, 382 374"/>

  <text x="340" y="197" class="label">requests</text>
  <text x="675" y="360" class="label">routed writes</text>
  <text x="674" y="548" class="label">approved changes</text>
  <text x="318" y="392" class="small">cache pointers only</text>

  <rect x="60" y="690" width="1155" height="42" rx="18" fill="#e8f1fb"/>
  <text x="88" y="716" class="small">Principle: Capability does not grant authority. The Vault outranks runtime memory. Class A changes require review or explicit approval.</text>
</svg>
